<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Adelfos Capital: System status and real-time service health.">
    <title>Status | Adelfos Capital Terminal</title>
    <link rel="icon"
        href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB4PSI1MCUiIHk9IjU0JSIgZm9udC1zaXplPSI3NSIgZmlsbD0id2hpdGUiIGZvbnQtZmFtaWx5PSJzZXJpZiIgZm9udC1zdHlsZT0iaXRhbGljIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0iY2VudHJhbCI+zrE8L3RleHQ+PC9zdmc+">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;1,300&family=Inter:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            overflow-y: auto;
            background-color: #000;
        }

        .status-container {
            max-width: 900px;
            margin: 12rem auto 8rem;
            padding: 0 2rem;
            width: 100%;
        }

        .services-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: #333;
            margin-bottom: 1.5rem;
        }

        .status-header-main h1 {
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -0.05em;
            color: #FFFFFF;
            margin-bottom: 2.5rem;
        }

        /* Status Container Spacing */
        .status-header-main {
            margin-top: 2rem;
        }

        /* Status Row Design */
        .status-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 4rem;
        }

        .status-row {
            background: rgba(255, 255, 255, 0.012);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 1.8rem 2.2rem;
            display: flex;
            align-items: center;
            gap: 3rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .status-row:hover {
            background: rgba(255, 255, 255, 0.025);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .service-meta {
            flex: 0 0 180px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .service-name {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            letter-spacing: -0.01em;
            text-transform: uppercase;
        }

        .service-uptime {
            font-size: 0.8rem;
            color: #777;
            font-family: 'Inter', monospace;
        }

        /* Uptime Bars */
        .uptime-bars {
            flex: 1;
            display: flex;
            gap: 3px;
            align-items: center;
            height: 24px;
        }

        .uptime-bar {
            flex: 1;
            height: 18px;
            background: #1a1a1a;
            border-radius: 1px;
            transition: all 0.3s ease;
        }

        .uptime-bar.up {
            background: #252525;
        }

        .uptime-bar.recent.up {
            background: #FFFFFF;
            opacity: 0.15;
        }

        .uptime-bar.recent:last-child {
            background: #FFFFFF;
            opacity: 1;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
        }

        .uptime-bar.down {
            background: #A01010;
            opacity: 1;
            box-shadow: 0 0 8px rgba(160, 16, 16, 0.5);
        }

        .service-status {
            flex: 0 0 100px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.8rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .service-status.is-up {
            color: #FFFFFF;
        }

        .service-status.is-down {
            color: #A01010;
        }

        .status-dot-static {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
        }

        @media (max-width: 900px) {
            #countdown.scrolled {
                width: 90%;
                padding: 0.6rem 1.5rem;
                gap: 1rem;
            }
            .status-container {
                margin-top: 10rem;
            }
            .status-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 1.5rem;
                padding: 2rem;
            }
            .service-meta, .uptime-bars, .service-status {
                flex: none;
                width: 100%;
            }
            .service-status {
                justify-content: flex-start;
            }
        }
    </style>
</head>

<body>
    <header class="logo-container" style="z-index: 101;">
        <a href="/" style="text-decoration: none;">
            <div class="logo">
                <span class="logo-alpha">α</span>
                <div class="logo-text">
                    <span class="bold">Adelfos</span><span class="thin">Capital</span>
                </div>
            </div>
        </a>
    </header>

    <div id="countdown" class="countdown scrolled">
        <div class="countdown-item"><span id="years">00</span><label>Years</label></div>
        <div class="countdown-item"><span id="months">00</span><label>Months</label></div>
        <div class="countdown-item"><span id="days">00</span><label>Days</label></div>
        <div class="countdown-item"><span id="hours">00</span><label>Hours</label></div>
        <div class="countdown-item little"><span id="minutes">00</span><label>Min</label></div>
        <div class="countdown-item smaller"><span id="seconds">00</span><label>Sec</label></div>
    </div>

    <main class="status-container">
        <div class="status-header-main">
            <span class="services-label">INFRASTRUCTURE</span>
            <h1>Real-Time Nodes</h1>
            
            <div class="overall-status" id="overallStatusContainer" style="display: inline-flex; align-items: center; gap: 0.8rem; padding: 0.7rem 1.5rem; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 50px; font-weight: 700; font-size: 0.75rem; margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">
                <span class="status-dot loading" id="overallStatusDot"></span>
                <span id="overallStatusText" style="color: #444;">Syncing...</span>
            </div>
            <div id="errorMessage" class="error-message" style="color: #A01010; background: rgba(160, 16, 16, 0.05); padding: 1rem; border-radius: 8px; margin-top: 2rem; display: none; font-size: 0.85rem; border: 1px solid rgba(160, 16, 16, 0.1);"></div>
        </div>

        <div class="status-list" id="monitorsGrid">
            <!-- Monitors will be injected here -->
            <div class="status-row" style="opacity: 0.2;">
                <div class="service-meta">
                    <div class="service-name">Establishing Handshake...</div>
                </div>
            </div>
        </div>
    </main>

    <footer style="margin-top: 10rem; padding: 4rem 2rem; border-top: 1px solid rgba(255,255,255,0.03); text-align: center;">
        <div class="logo" style="opacity: 0.3; justify-content: center; margin-bottom: 2rem;">
            <span class="logo-alpha">α</span>
            <div class="logo-text">
                <span class="bold">Adelfos</span><span class="thin">Capital</span>
            </div>
        </div>
        <div style="font-size: 0.7rem; color: #333; letter-spacing: 0.2em; text-transform: uppercase;">Institutional Grade Infrastructure</div>
    </footer>

    <script type="module" src="status.js"></script>
</body>

</html>
