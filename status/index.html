<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Adelfos Capital: System status and real-time service health.">
    <title>Status | Adelfos Capital Terminal</title>
    <link rel="icon"
        href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB4PSI1MCUiIHk9IjU0JSIgZm9udC1zaXplPSI3NSIgZmlsbD0id2hpdGUiIGZvbnQtZmFtaWx5PSJzZXJpZiIgZm9udC1zdHlsZT0iaXRhbGljIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0iY2VudHJhbCI+zrE8L3RleHQ+PC9zdmc+">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;1,300&family=Inter:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --pitch-white: #FFFFFF;
            --granate-red: #A12D2D;
            --na-gray: #222222;
            --history-gray: #444444;
        }

        body {
            overflow-y: auto;
            background-color: #000;
            padding-bottom: 200px; /* Space for sticky footer */
        }

        .status-header-main {
            max-width: 1000px;
            margin: 12rem auto 2rem;
            padding: 0 2rem;
            text-align: left;
        }

        .services-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: #444;
            margin-bottom: 1.2rem;
        }

        .status-header-main h1 {
            font-size: clamp(2.5rem, 6vw, 3.8rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--pitch-white);
            margin-bottom: 2rem;
        }

        /* Dynamic Island Countdown (Floating Pill) */
        .dynamic-island-wrapper {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            pointer-events: none;
        }

        #countdown.dynamic-island {
            display: flex;
            gap: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            padding: 0.6rem 2.8rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9);
            pointer-events: auto;
        }

        #countdown.dynamic-island .countdown-item span {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--pitch-white);
            line-height: 1;
        }

        #countdown.dynamic-island .countdown-item label {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            display: block;
            margin-top: 2px;
        }

        /* Status List */
        .status-list-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .status-row {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 1.5rem 2.2rem;
            display: flex;
            align-items: center;
            gap: 2.5rem;
            margin-bottom: 1rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .status-row:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.03);
        }

        .service-meta {
            flex: 0 0 220px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .service-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #888;
            letter-spacing: -0.01em;
            transition: color 0.3s ease;
        }

        .status-row:hover .service-name {
            color: var(--pitch-white);
        }

        .service-uptime {
            font-size: 0.8rem;
            color: var(--pitch-white);
            font-family: 'Inter', monospace;
            opacity: 0.5;
        }

        /* Activity Bars */
        .uptime-bars {
            flex: 1;
            display: flex;
            gap: 2px;
            align-items: center;
            height: 24px;
        }

        .uptime-bar {
            flex: 1;
            height: 18px;
            background: var(--na-gray);
            border-radius: 1px;
            transition: all 0.3s ease;
        }

        .uptime-bar.up {
            background: var(--history-gray);
        }

        .uptime-bar.recent.up {
            background: var(--pitch-white);
            opacity: 0.3;
        }

        .uptime-bar.recent:last-child {
            background: var(--pitch-white);
            opacity: 1;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .uptime-bar.down {
            background: var(--granate-red);
        }

        .service-status {
            flex: 0 0 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.6rem;
            font-size: 0.8rem;
            font-weight: 700;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .service-status.is-up {
            color: var(--pitch-white);
        }

        .service-status.is-down {
            color: var(--granate-red);
        }

        .status-dot-static {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* Sticky Bottom CTA Island */
        .sticky-cta-wrapper {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: auto;
            min-width: 600px;
        }

        .sticky-cta-island {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 1.2rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        /* Background Grid for CTA Island */
        .sticky-cta-island::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            opacity: 0.8;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
            z-index: -1;
        }

        .cta-text h2 {
            font-family: 'Crimson Pro', serif;
            font-size: 1.8rem;
            font-weight: 300;
            font-style: italic;
            color: var(--pitch-white);
            line-height: 1;
            margin-bottom: 0.2rem;
        }

        .cta-text p {
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .waitlist-btn.premium {
            background: var(--pitch-white);
            color: #000;
            padding: 0.8rem 2.2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .waitlist-btn.premium:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 900px) {
            .sticky-cta-wrapper {
                width: 90%;
                min-width: unset;
                bottom: 2rem;
            }
            .sticky-cta-island {
                flex-direction: column;
                gap: 1.5rem;
                border-radius: 24px;
                padding: 1.5rem;
                text-align: center;
            }
            .status-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 1.2rem;
                padding: 1.5rem 1.8rem;
            }
            .service-meta, .uptime-bars, .service-status {
                flex: none;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header class="logo-container" style="z-index: 101;">
        <a href="/" style="text-decoration: none;">
            <div class="logo">
                <span class="logo-alpha">α</span>
                <div class="logo-text">
                    <span class="bold">Adelfos</span><span class="thin">Capital</span>
                </div>
            </div>
        </a>
    </header>

    <div class="dynamic-island-wrapper">
        <div id="countdown" class="dynamic-island">
            <div class="countdown-item"><span id="years">00</span><label>Years</label></div>
            <div class="countdown-item"><span id="months">00</span><label>Months</label></div>
            <div class="countdown-item"><span id="days">00</span><label>Days</label></div>
            <div class="countdown-item"><span id="hours">00</span><label>Hours</label></div>
            <div class="countdown-item"><span id="minutes">00</span><label>Minutes</label></div>
            <div class="countdown-item"><span id="seconds">00</span><label>Seconds</label></div>
        </div>
    </div>

    <main class="status-header-main">
        <span class="services-label">SYSTEM HEALTH</span>
        <h1>Operations Status</h1>
        
            <div id="errorMessage" class="error-message" style="color: var(--granate-red); background: rgba(161, 45, 45, 0.05); padding: 1rem; border-radius: 8px; margin-top: 2rem; display: none; font-size: 0.85rem; border: 1px solid rgba(161, 45, 45, 0.1);"></div>
    </main>

    <div class="status-list-container" id="monitorsGrid">
        <!-- Monitors will be injected here -->
    </div>

    <div class="sticky-cta-wrapper">
        <div class="sticky-cta-island">
            <div class="cta-text">
                <h2>The calculation is running.</h2>
                <p>Limited phase 1 terminal keys remain</p>
            </div>
            <a href="/#heroSection" class="waitlist-btn premium">
                SECURE ACCESS
            </a>
        </div>
    </div>

    <script type="module" src="status.js"></script>
</body>

</html>
